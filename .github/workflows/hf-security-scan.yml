name: HF Security Intelligence Scanner

on:
  schedule:
    - cron: '0 * * * *'   # Every hour
  workflow_dispatch:        # Manual trigger for testing

permissions:
  contents: write           # Required to cache state artifact

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Restore previous state
        id: restore-state
        uses: actions/cache@v4
        with:
          path: scripts/.scan_state.json
          key: hf-scan-state-${{ github.run_number }}
          restore-keys: hf-scan-state-

      - name: Run HF security scanner
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_RECIPIENT: ${{ secrets.DIGEST_RECIPIENT }}
        run: python scripts/hf_security_scanner.py

      - name: Save updated state
        uses: actions/cache@v4
        with:
          path: scripts/.scan_state.json
          key: hf-scan-state-${{ github.run_number }}
