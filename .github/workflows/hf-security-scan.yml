name: HF Security Intelligence Scan

on:
  schedule:
    # Every hour at :00
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      run_note:
        description: 'Optional note for this manual run'
        required: false
        default: 'Manual trigger'

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install huggingface_hub requests

      - name: Run HF security scan
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
          GMAIL_RECIPIENT: ${{ secrets.GMAIL_RECIPIENT }}
          # Optional: use SendGrid or similar for email delivery
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python .github/scripts/hf_security_scan.py

  notify-failure:
    runs-on: ubuntu-latest
    needs: scan
    if: failure()
    steps:
      - name: Report failure
        run: |
          echo "HF Security Scan workflow failed at $(date -u)" >> $GITHUB_STEP_SUMMARY
