name: HF Security Intelligence Scan

on:
  schedule:
    # Runs every hour at :00
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      scan_window_hours:
        description: 'Hours to look back for new/updated repos'
        required: false
        default: '1'

permissions:
  contents: read

jobs:
  scan:
    name: Scan Hugging Face for Security Repos
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/hf-security-scan/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/hf-security-scan/requirements.txt

      - name: Run security scan
        working-directory: scripts/hf-security-scan
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID || 'd9311332-6b18-45bf-8884-6c98f99e69dc' }}
          GMAIL_TOKEN: ${{ secrets.GMAIL_TOKEN }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL || 'dejager.sa@gmail.com' }}
          SCAN_WINDOW_HOURS: ${{ github.event.inputs.scan_window_hours || '1' }}
        run: python scan.py

      - name: Upload scan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-results-${{ github.run_number }}
          path: scripts/hf-security-scan/scan_results.json
          retention-days: 7
