name: HF Security Intelligence Scanner

on:
  schedule:
    - cron: '0 * * * *'   # Every hour on the hour UTC
  workflow_dispatch:
    inputs:
      force_full_report:
        description: 'Force email/Notion even with no new findings'
        type: boolean
        default: false

concurrency:
  group: hf-security-scan
  cancel-in-progress: false

jobs:
  scan:
    name: Scan HuggingFace for Security Repositories
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # Restore scan state from the most recent previous run
      - name: Restore scan state
        uses: actions/cache/restore@v4
        with:
          path: scripts/scan_state.json
          key: hf-scan-state-${{ github.run_id }}
          restore-keys: hf-scan-state-

      - name: Run security scanner
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          FORCE_REPORT: ${{ github.event.inputs.force_full_report || 'false' }}
        run: python scripts/hf_security_scanner.py

      # Persist updated state for the next run
      - name: Save scan state
        uses: actions/cache/save@v4
        if: always()
        with:
          path: scripts/scan_state.json
          key: hf-scan-state-${{ github.run_id }}

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-digest-${{ github.run_id }}
          path: scripts/latest_digest.md
          retention-days: 30
          if-no-files-found: ignore
