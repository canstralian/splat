name: HF Security Intelligence Scan

on:
  schedule:
    # Runs every hour at :05 past the hour (UTC)
    - cron: '5 * * * *'
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: 'Hours to look back for new/updated repos'
        required: false
        default: '2'
      dry_run:
        description: 'Dry run (print digest, skip Notion/Gmail)'
        required: false
        type: boolean
        default: false

jobs:
  scan:
    name: Scan HF Hub for security repositories
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements-scan.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements-scan.txt

      - name: Run security scan
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
          GMAIL_CREDS_JSON: ${{ secrets.GMAIL_CREDS_JSON }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
        run: |
          ARGS="--lookback-hours ${{ github.event.inputs.lookback_hours || '2' }}"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python scripts/hf_security_scan.py $ARGS

      - name: Upload scan log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-log-${{ github.run_number }}
          path: /tmp/hf_scan_counter.txt
          if-no-files-found: ignore
          retention-days: 7
